server:
  port: 8081

spring:
  application:
    name: payment-service

  threads:
    virtual:
      enabled: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  output:
    ansi:
      enabled: always

  myapp:
    nicepay:
      client-key: ${NICEPAY_CLIENT_KEY:}
      secret-key: ${NICEPAY_SECRET_KEY:}
      api-url: ${NICEPAY_API_URL:https://sandbox-api.nicepay.co.kr}

springdoc:
  packages-to-scan: com.hyoguoo.paymentplatform
  default-produces-media-type: application/json
  api-docs:
    path: /api-docs/json
    groups:
      enabled: true
  cache:
    disabled: true

spring.profiles.default: local

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:false}
    register-with-eureka: ${EUREKA_CLIENT_ENABLED:false}
    fetch-registry: ${EUREKA_CLIENT_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

payment:
  retry:
    max-attempts: 5
    backoff-type: FIXED
    base-delay-ms: 5000
    max-delay-ms: 60000
  idempotency:
    maximum-size: 10000
    expire-after-write-seconds: 10
  gateway:
    type: TOSS
    toss:
      base-url: https://api.tosspayments.com
      secret-key: ${TOSS_SECRET_KEY:}
      connect-timeout: 3000
      read-timeout: 10000

product-service:
  base-url: ${PRODUCT_SERVICE_BASE_URL:http://localhost:8083}

user-service:
  base-url: ${USER_SERVICE_BASE_URL:http://localhost:8084}

product:
  adapter:
    type: ${PRODUCT_ADAPTER_TYPE:internal}

user:
  adapter:
    type: ${USER_ADAPTER_TYPE:internal}

scheduler:
  outbox-worker:
    fixed-delay-ms: 5000
    batch-size: 50
    parallel-enabled: true
    in-flight-timeout-minutes: 5

metrics:
  payment:
    state:
      polling-interval-seconds: 10
    health:
      polling-interval-seconds: 10
      thresholds:
        stuck-in-progress-minutes: 5
        max-retry-count: 5
