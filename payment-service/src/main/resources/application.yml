server:
  port: 8081
  # Spring Cloud Gateway 뒤에 있을 때 NicepayReturnController 같은 서버 측 redirect가
  # backend hostname(payment-service:8080) 대신 사용자 origin(localhost:8090)을 사용하도록
  # X-Forwarded-Host/Port/Proto 헤더를 ForwardedHeaderFilter 가 신뢰하게 한다.
  # Spring Boot 3 기본값 none 이면 헤더가 무시되어 도커 네트워크 호스트로 absolute redirect 가 만들어진다.
  forward-headers-strategy: framework

spring:
  application:
    name: payment-service

  threads:
    virtual:
      enabled: true

  cloud:
    openfeign:
      client:
        config:
          default:
            # Feign timeout baseline — Phase 4 부하 측정 기반 SLO 로 조정 예정 (TODOS.md T4-D 참고).
            connectTimeout: 2000
            readTimeout: 5000

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 25
          # D3 — DATETIME(6) 컬럼에 Instant 를 UTC 기준으로 저장/조회.
          # Hibernate 가 Instant ↔ DATETIME 변환 시 이 TZ 를 사용한다.
          time_zone: UTC
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      properties:
        # D6 결정 — EOS read_committed: abort 된 트랜잭션 메시지가 컨슈머에 노출되지 않도록 차단.
        # payment-service 는 자기 자신이 발행한 stock-committed 를 컨슘하지 않으나 일관성 기준 적용.
        isolation.level: read_committed
    template:
      observation-enabled: true
    listener:
      observation-enabled: true

  output:
    ansi:
      enabled: always

springdoc:
  packages-to-scan: com.hyoguoo.paymentplatform
  default-produces-media-type: application/json
  api-docs:
    path: /api-docs/json
    groups:
      enabled: true
  cache:
    disabled: true

spring.profiles.default: local

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:false}
    register-with-eureka: ${EUREKA_CLIENT_ENABLED:false}
    fetch-registry: ${EUREKA_CLIENT_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    # D4 보강 — transactional.id 의 HOSTNAME:local 패턴과 결 통일.
    # random.uuid 는 재시작마다 달라져 transactional.id 의 결정성 의도와 충돌.
    # HOSTNAME:local 기반으로 단일 인스턴스 가정의 안정적 instanceId 부여.
    # 다중 인스턴스 확장 시 CONCERNS.md L6 / TODOS TC-13-FOLLOW-1 참조.
    instance-id: ${spring.application.name}:${HOSTNAME:local}:${server.port}

payment:
  cache:
    stock-redis:
      # 재고 선차감 캐시 전용 Redis(redis-stock). dedupe / idempotency 용 redis-dedupe 와 분리.
      # 로컬 실행 시 6380 으로 띄운 redis 가 필요. 테스트는 FakeStockCachePort 주입.
      host: ${REDIS_STOCK_HOST:localhost}
      port: ${REDIS_STOCK_PORT:6380}
  retry:
    max-attempts: 5
    backoff-type: FIXED
    base-delay-ms: 5000
    max-delay-ms: 60000
  idempotency:
    maximum-size: 10000
    expire-after-write-seconds: 10
  kafka:
    topics:
      commands-confirm: ${PAYMENT_TOPIC_COMMANDS_CONFIRM:payment.commands.confirm}
      events-stock-committed: ${PAYMENT_TOPIC_EVENTS_STOCK_COMMITTED:payment.events.stock-committed}
    error-handler:
      backoff:
        # FixedBackOff 재시도 간격 (ms). 일시적 인프라 장애(Redis/RDB) 복구를 기다리는 시간.
        interval: 1000
        # 최대 재시도 횟수. 초과 시 DeadLetterPublishingRecoverer 로 DLQ 발행.
        max-attempts: 5
  expiration:
    # D4 — 만료 임계(분). READY 상태에서 이 시간이 지나면 만료 후보가 된다. 기본값 30분.
    ready-timeout-minutes: 30

product:
  adapter:
    type: ${PRODUCT_ADAPTER_TYPE:http}

user:
  adapter:
    type: ${USER_ADAPTER_TYPE:http}

scheduler:
  # D5 — 만료 스케줄러(READY → EXPIRED). 주키. 운영 application-docker.yml 에서 오버라이드.
  # scheduler.payment-expiration.fixed-rate: (기본값 없음 — PaymentScheduler fallback 300000ms)
  # scheduler.payment-status-sync.fixed-rate: fallback 키(이름 불일치 구 버전, 이연 삭제 가능)
  # reconciler.* : 정합 스캐너(IN_PROGRESS → READY, 별개 스케줄러)
  outbox-worker:
    fixed-delay-ms: 5000
    batch-size: 50
    parallel-enabled: true
    in-flight-timeout-minutes: 5
  dedupe-cleanup-worker:
    # payment_event_dedupe 만료 행 청소 주기 (ms). 기본값 1시간.
    # 보존 정책: TTL(8d) > Kafka retention(7d) 불변식 준수 — 단축 금지.
    fixed-delay-ms: 3600000
    batch-size: 1000
metrics:
  payment:
    state:
      polling-interval-seconds: 10
    health:
      polling-interval-seconds: 10
      thresholds:
        stuck-in-progress-minutes: 5
        max-retry-count: 5

management:
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
