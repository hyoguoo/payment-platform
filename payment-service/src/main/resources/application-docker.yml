spring:
  config:
    activate:
      on-profile: docker

  datasource:
    # D7 — connectionTimeZone=UTC+forceConnectionTimeZoneToSession=true: raw-JDBC 경로(JdbcTemplate)의
    # DATETIME 저장/조회가 JVM TZ 에 관계없이 UTC 기준으로 동작하도록 세션 TZ 를 UTC 로 강제한다.
    url: jdbc:mysql://mysql-payment:3306/payment-platform?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:payment123}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 15
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          # D3 — DATETIME(6) 컬럼에 Instant 를 UTC 기준으로 저장/조회.
          time_zone: UTC

payment:
  cache:
    stock-redis:
      host: ${REDIS_STOCK_HOST:redis-stock}
      port: ${REDIS_STOCK_PORT:6379}

logging:
  level:
    root: INFO
    com.hyoguoo.paymentplatform: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

scheduler:
  enabled: true
  # D5 — 주키 payment-expiration.fixed-rate 로 정정. 이전 payment-status-sync.fixed-rate 는 fallback 유지(혼재 배포 무중단).
  payment-expiration:
    fixed-rate: 3600000
  payment-status-sync:
    fixed-rate: 3600000

springdoc:
  swagger-ui:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: payment-platform
      environment: docker
  prometheus:
    metrics:
      export:
        enabled: true

server:
  port: 8080
  tomcat:
    threads:
      max: 200
      min-spare: 25
    accept-count: 100
