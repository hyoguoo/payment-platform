spring:
  config:
    activate:
      on-profile: benchmark

  threads:
    virtual:
      enabled: false   # Tomcat은 PT 고정 — 비동기 처리(Worker)에만 VT 적용

  datasource:
    hikari:
      maximum-pool-size: 30   # Sweet spot for 100 req/s load on local Mac

payment:
  cache:
    stock-redis:
      host: ${REDIS_STOCK_HOST:redis-stock}
      port: ${REDIS_STOCK_PORT:6379}

scheduler:
  enabled: true
  outbox-worker:
    fixed-delay-ms: 2000                             # 폴링 주기 2초
    batch-size: ${SCHEDULER_OUTBOX_WORKER_BATCH_SIZE:100}
    parallel-enabled: ${SCHEDULER_PARALLEL_ENABLED:true}   # OutboxWorker 폴백 병렬 처리 여부
