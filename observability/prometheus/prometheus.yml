global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: docker

# Tempo metrics_generator remote_write 수신 시 out-of-order 샘플 허용 (30m 윈도우)
# Prometheus 2.39+ 기능: span_metrics/service_graphs 집계 타임스탬프가
# scrape 타임라인보다 약간 과거일 수 있어 이 설정 없이는 샘플 거부 가능
storage:
  tsdb:
    out_of_order_time_window: 30m

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["payment-service:8080"]
        labels:
          application: payment-service

  - job_name: pg-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["pg-service:8082"]
        labels:
          application: pg-service

  - job_name: product-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["product-service:8083"]
        labels:
          application: product-service

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["user-service:8084"]
        labels:
          application: user-service

  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["gateway:8080"]
        labels:
          application: gateway

  - job_name: eureka-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["eureka:8761"]
        labels:
          application: eureka-server

  - job_name: kafka-exporter
    static_configs:
      - targets: ["kafka-exporter:9308"]
        labels:
          application: kafka
