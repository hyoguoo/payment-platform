name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run tests
        run: ./gradlew test jacocoTestReport

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: |
            payment-service/build/reports/jacoco/test/html/
            pg-service/build/reports/jacoco/test/html/
            product-service/build/reports/jacoco/test/html/
            user-service/build/reports/jacoco/test/html/
            gateway/build/reports/jacoco/test/html/
            eureka-server/build/reports/jacoco/test/html/
          retention-days: 14

      - name: JUnit Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: |
            **/build/test-results/test/**/*.xml
            **/build/test-results/integrationTest/**/*.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          check_name: JUnit Test Report

      # 커버리지 코멘트는 서비스별로 분리한다. 단일 합산은 Overall 한 줄만 나와
      # 어느 서비스가 낮은지 안 보이므로, payment/pg/product/user 각각 별도 코멘트로 노출.
      # gateway/eureka 는 측정 대상 클래스가 거의 없어 제외.
      - name: Coverage comment - payment-service
        if: github.event_name == 'pull_request'
        uses: Madrapps/jacoco-report@v1.7.2
        with:
          paths: ${{ github.workspace }}/payment-service/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: 📊 payment-service Coverage
          update-comment: true

      - name: Coverage comment - pg-service
        if: github.event_name == 'pull_request'
        uses: Madrapps/jacoco-report@v1.7.2
        with:
          paths: ${{ github.workspace }}/pg-service/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: 📊 pg-service Coverage
          update-comment: true

      - name: Coverage comment - product-service
        if: github.event_name == 'pull_request'
        uses: Madrapps/jacoco-report@v1.7.2
        with:
          paths: ${{ github.workspace }}/product-service/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: 📊 product-service Coverage
          update-comment: true

      - name: Coverage comment - user-service
        if: github.event_name == 'pull_request'
        uses: Madrapps/jacoco-report@v1.7.2
        with:
          paths: ${{ github.workspace }}/user-service/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: 📊 user-service Coverage
          update-comment: true

  lint:
    name: Lint (Checkstyle + SpotBugs)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Run Checkstyle
        id: checkstyle
        # --continue: 한 모듈의 task 실패가 다른 모듈 실행을 막지 않도록 — 라운드당 한 번에 모든 위반 surface
        run: ./gradlew checkstyleMain checkstyleTest --continue
        continue-on-error: true

      - name: Run SpotBugs
        id: spotbugs
        # --continue 동일 이유 — 한 모듈 fail 이 다른 모듈 spotbugs 차단 방지
        run: ./gradlew spotbugsMain --continue
        continue-on-error: true

      - name: Reviewdog — Checkstyle
        if: always() && github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 모든 subproject 의 checkstyle 리포트를 합쳐서 reviewdog 에 전달
          for module in payment-service pg-service product-service user-service gateway eureka-server; do
            for report in main test; do
              file="$module/build/reports/checkstyle/${report}.xml"
              if [ -f "$file" ]; then
                reviewdog -f=checkstyle -name="Checkstyle (${module}/${report})" \
                  -reporter=github-pr-review -fail-on-error=true \
                  < "$file"
              fi
            done
          done

      - name: Reviewdog — SpotBugs
        if: always() && github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 모든 subproject 의 spotbugs main 리포트를 reviewdog 에 전달
          # 두 번째 인자로 module 디렉토리 명시 — sourcepath 앞에 prefix 추가되어 PR diff 매칭됨
          for module in payment-service pg-service product-service user-service gateway eureka-server; do
            file="$module/build/reports/spotbugs/main.xml"
            if [ -f "$file" ]; then
              python3 .github/scripts/spotbugs-to-rdjsonl.py "$file" "$module" \
                | reviewdog -f=rdjsonl -name="SpotBugs (${module})" \
                  -reporter=github-pr-review -fail-on-error=true
            fi
          done

      - name: Lint summary comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/scripts/lint-summary.js');
            await script({ github, context });

      - name: Fail on violations (push)
        if: always() && github.event_name != 'pull_request'
        run: |
          if [ "${{ steps.checkstyle.outcome }}" != "success" ] || \
             [ "${{ steps.spotbugs.outcome }}" != "success" ]; then
            echo "Lint violations found."
            exit 1
          fi
