name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run tests
        run: ./gradlew test jacocoTestReport

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: |
            payment-service/build/reports/jacoco/test/html/
            pg-service/build/reports/jacoco/test/html/
            product-service/build/reports/jacoco/test/html/
            user-service/build/reports/jacoco/test/html/
            gateway/build/reports/jacoco/test/html/
            eureka-server/build/reports/jacoco/test/html/
          retention-days: 14

      - name: JaCoCo PR coverage comment
        if: github.event_name == 'pull_request'
        uses: Madrapps/jacoco-report@v1.7.2
        with:
          paths: |
            ${{ github.workspace }}/payment-service/build/reports/jacoco/test/jacocoTestReport.xml
            ${{ github.workspace }}/pg-service/build/reports/jacoco/test/jacocoTestReport.xml
            ${{ github.workspace }}/product-service/build/reports/jacoco/test/jacocoTestReport.xml
            ${{ github.workspace }}/user-service/build/reports/jacoco/test/jacocoTestReport.xml
            ${{ github.workspace }}/gateway/build/reports/jacoco/test/jacocoTestReport.xml
            ${{ github.workspace }}/eureka-server/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          update-comment: true

  lint:
    name: Lint (Checkstyle + SpotBugs)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Run Checkstyle
        id: checkstyle
        run: ./gradlew checkstyleMain checkstyleTest
        continue-on-error: true

      - name: Run SpotBugs
        id: spotbugs
        run: ./gradlew spotbugsMain
        continue-on-error: true

      - name: Reviewdog — Checkstyle
        if: always() && github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 모든 subproject 의 checkstyle 리포트를 합쳐서 reviewdog 에 전달
          for module in payment-service pg-service product-service user-service gateway eureka-server; do
            for report in main test; do
              file="$module/build/reports/checkstyle/${report}.xml"
              if [ -f "$file" ]; then
                reviewdog -f=checkstyle -name="Checkstyle (${module}/${report})" \
                  -reporter=github-pr-review -fail-on-error=true \
                  < "$file"
              fi
            done
          done

      - name: Reviewdog — SpotBugs
        if: always() && github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 모든 subproject 의 spotbugs main 리포트를 reviewdog 에 전달
          # 두 번째 인자로 module 디렉토리 명시 — sourcepath 앞에 prefix 추가되어 PR diff 매칭됨
          for module in payment-service pg-service product-service user-service gateway eureka-server; do
            file="$module/build/reports/spotbugs/main.xml"
            if [ -f "$file" ]; then
              python3 .github/scripts/spotbugs-to-rdjsonl.py "$file" "$module" \
                | reviewdog -f=rdjsonl -name="SpotBugs (${module})" \
                  -reporter=github-pr-review -fail-on-error=true
            fi
          done

      - name: Lint summary comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/scripts/lint-summary.js');
            await script({ github, context });

      - name: Fail on violations (push)
        if: always() && github.event_name != 'pull_request'
        run: |
          if [ "${{ steps.checkstyle.outcome }}" != "success" ] || \
             [ "${{ steps.spotbugs.outcome }}" != "success" ]; then
            echo "Lint violations found."
            exit 1
          fi
