name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ── 6서비스 fan-out (D1/D2 결정 이행) ─────────────────────────────────────
  # 각 서비스는 _service-ci.yml 재사용 워크플로우를 독립 호출한다.
  # user-service: D8 결정으로 has-integration true (T4에서 integrationTest 태스크 신설)
  # gateway / eureka-server: 측정 대상 클래스 0, 통합테스트 없음
  payment:
    uses: ./.github/workflows/_service-ci.yml
    with:
      service: payment-service
      has-integration: true
    secrets: inherit

  pg:
    uses: ./.github/workflows/_service-ci.yml
    with:
      service: pg-service
      has-integration: true
    secrets: inherit

  product:
    uses: ./.github/workflows/_service-ci.yml
    with:
      service: product-service
      has-integration: true
    secrets: inherit

  user:
    uses: ./.github/workflows/_service-ci.yml
    with:
      service: user-service
      has-integration: true
    secrets: inherit

  gateway:
    uses: ./.github/workflows/_service-ci.yml
    with:
      service: gateway
      has-integration: false
    secrets: inherit

  eureka:
    uses: ./.github/workflows/_service-ci.yml
    with:
      service: eureka-server
      has-integration: false
    secrets: inherit

  # ── 취합 job (D4 결정 이행) ────────────────────────────────────────────────
  # 6서비스 아티팩트를 수집해 PR 단일 통합 코멘트를 조립한다.
  # always(): 일부 서비스 실패에도 리포트를 남긴다 (O4 — 코멘트 난립 금지).
  # Discord 알림 step 없음 (D4 제거).
  report:
    name: Report (PR 단일 통합 코멘트)
    needs: [payment, pg, product, user, gateway, eureka]
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest

    steps:
      # ── report-comment.js 실행용 리포지토리 체크아웃 ─────────────────────
      # 반드시 아티팩트 다운로드보다 먼저 실행한다. checkout 은 기본 clean: true 로
      # git clean -ffdx 를 돌려 untracked 파일을 지우는데, 뒤에 두면 download 로 받은
      # artifacts/ 를 통째로 삭제해 커버리지·lint 데이터가 소실된다.
      - name: Checkout (스크립트 접근용)
        uses: actions/checkout@v6

      # ── 6서비스 커버리지 아티팩트 다운로드 ────────────────────────────────
      - name: Download coverage — payment-service
        uses: actions/download-artifact@v7
        with:
          name: coverage-payment-service
          path: artifacts/coverage-payment-service
        continue-on-error: true

      - name: Download coverage — pg-service
        uses: actions/download-artifact@v7
        with:
          name: coverage-pg-service
          path: artifacts/coverage-pg-service
        continue-on-error: true

      - name: Download coverage — product-service
        uses: actions/download-artifact@v7
        with:
          name: coverage-product-service
          path: artifacts/coverage-product-service
        continue-on-error: true

      - name: Download coverage — user-service
        uses: actions/download-artifact@v7
        with:
          name: coverage-user-service
          path: artifacts/coverage-user-service
        continue-on-error: true

      - name: Download coverage — gateway
        uses: actions/download-artifact@v7
        with:
          name: coverage-gateway
          path: artifacts/coverage-gateway
        continue-on-error: true

      - name: Download coverage — eureka-server
        uses: actions/download-artifact@v7
        with:
          name: coverage-eureka-server
          path: artifacts/coverage-eureka-server
        continue-on-error: true

      # ── 6서비스 lint 요약 아티팩트 다운로드 ──────────────────────────────
      - name: Download lint — payment-service
        uses: actions/download-artifact@v7
        with:
          name: lint-payment-service
          path: artifacts/lint-payment-service
        continue-on-error: true

      - name: Download lint — pg-service
        uses: actions/download-artifact@v7
        with:
          name: lint-pg-service
          path: artifacts/lint-pg-service
        continue-on-error: true

      - name: Download lint — product-service
        uses: actions/download-artifact@v7
        with:
          name: lint-product-service
          path: artifacts/lint-product-service
        continue-on-error: true

      - name: Download lint — user-service
        uses: actions/download-artifact@v7
        with:
          name: lint-user-service
          path: artifacts/lint-user-service
        continue-on-error: true

      - name: Download lint — gateway
        uses: actions/download-artifact@v7
        with:
          name: lint-gateway
          path: artifacts/lint-gateway
        continue-on-error: true

      - name: Download lint — eureka-server
        uses: actions/download-artifact@v7
        with:
          name: lint-eureka-server
          path: artifacts/lint-eureka-server
        continue-on-error: true

      # ── PR 단일 통합 코멘트 조립/갱신 (update-or-create 패턴, O4) ─────────
      - name: PR 단일 통합 코멘트 조립
        uses: actions/github-script@v9
        with:
          script: |
            const script = require('./.github/scripts/report-comment.js');
            await script({ github, context, artifactsDir: 'artifacts' });
