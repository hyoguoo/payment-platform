name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# PR 에 연속 push 시 진행 중인 이전 run 을 취소해 6서비스 fan-out runner 낭비를 막는다.
# main push 는 취소하지 않는다(머지 이력별 결과 보존).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ── 6서비스 fan-out (D1/D2 결정 이행) ─────────────────────────────────────
  # 각 서비스는 _service-ci.yml 재사용 워크플로우를 독립 호출한다.
  # user-service: D8 결정으로 has-integration true (T4에서 integrationTest 태스크 신설)
  # gateway / eureka-server: 측정 대상 클래스 0, 통합테스트 없음
  payment:
    uses: ./.github/workflows/_service-ci.yml
    with:
      service: payment-service
      has-integration: true
    secrets: inherit

  pg:
    uses: ./.github/workflows/_service-ci.yml
    with:
      service: pg-service
      has-integration: true
    secrets: inherit

  product:
    uses: ./.github/workflows/_service-ci.yml
    with:
      service: product-service
      has-integration: true
    secrets: inherit

  user:
    uses: ./.github/workflows/_service-ci.yml
    with:
      service: user-service
      has-integration: true
    secrets: inherit

  gateway:
    uses: ./.github/workflows/_service-ci.yml
    with:
      service: gateway
      has-integration: false
    secrets: inherit

  eureka:
    uses: ./.github/workflows/_service-ci.yml
    with:
      service: eureka-server
      has-integration: false
    secrets: inherit

  # ── 취합 job (D4 결정 이행) ────────────────────────────────────────────────
  # 6서비스 아티팩트를 수집해 PR 단일 통합 코멘트를 조립한다.
  # always(): 일부 서비스 실패에도 리포트를 남긴다 (O4 — 코멘트 난립 금지).
  # Discord 알림 step 없음 (D4 제거).
  report:
    name: Report (PR 단일 통합 코멘트)
    needs: [payment, pg, product, user, gateway, eureka]
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── report-comment.js 실행용 리포지토리 체크아웃 ─────────────────────
      # 반드시 아티팩트 다운로드보다 먼저 실행한다. checkout 은 기본 clean: true 로
      # git clean -ffdx 를 돌려 untracked 파일을 지우는데, 뒤에 두면 download 로 받은
      # artifacts/ 를 통째로 삭제해 커버리지·lint 데이터가 소실된다.
      - name: Checkout (스크립트 접근용)
        uses: actions/checkout@v6

      # ── 6서비스 아티팩트 다운로드 (pattern 일괄) ──────────────────────────
      # download-artifact 는 pattern 매칭 아티팩트를 각자 이름 디렉토리로 푼다
      # (merge-multiple 기본 false): artifacts/coverage-<svc>/..., artifacts/lint-<svc>/...
      # 일부 서비스 job 실패로 아티팩트가 없어도 존재분만 받고 에러 없음.
      - name: Download coverage artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: coverage-*
          path: artifacts

      - name: Download lint artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: lint-*
          path: artifacts

      # ── PR 단일 통합 코멘트 조립/갱신 (update-or-create 패턴, O4) ─────────
      - name: PR 단일 통합 코멘트 조립
        uses: actions/github-script@v9
        with:
          script: |
            const script = require('./.github/scripts/report-comment.js');
            await script({ github, context, artifactsDir: 'artifacts' });
