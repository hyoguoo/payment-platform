# k6 벤치마크 전용 (레거시 모놀리식 구성)
#
# 이 compose는 k6 부하 테스트에서만 사용한다. MSA 스택(docker-compose.infra.yml +
# docker-compose.apps.yml)과는 포트 3306/8080이 겹치므로 동시 기동 금지.
# ELK/Prometheus/Grafana/cAdvisor는 2026-04-22 삭제됐고 필요 시 재작성한다.
# MSA 관측성 스택이 필요하면 docker-compose.observability.yml을 사용한다.
services:
  mysql:
    image: mysql:8.0
    platform: linux/arm64
    container_name: payment-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-payment123}
      MYSQL_DATABASE: payment-platform
      MYSQL_USER: ${MYSQL_USER:-payment}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-payment123}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - payment-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: payment-app
    env_file:
      - .env.secret
    environment:
      - SPRING_PROFILES_ACTIVE=docker${BENCHMARK_PROFILE:-}
      - DB_USERNAME=${MYSQL_USER:-payment}
      - DB_PASSWORD=${MYSQL_PASSWORD:-payment123}
      - JAVA_OPTS=-Xms512m -Xmx1024m
      - ASYNC_STRATEGY=${ASYNC_STRATEGY}
      - VIRTUAL_THREADS_ENABLED=${VIRTUAL_THREADS_ENABLED:-false}
      - SCHEDULER_OUTBOX_WORKER_BATCH_SIZE=${OUTBOX_BATCH_SIZE:-10}
      - TOSS_MIN_DELAY_MILLIS=${TOSS_MIN_DELAY_MILLIS}
      - TOSS_MAX_DELAY_MILLIS=${TOSS_MAX_DELAY_MILLIS}
      - WORKER_COUNT=${WORKER_COUNT:-300}
      - CHANNEL_CAPACITY=${CHANNEL_CAPACITY:-5000}
      - CHANNEL_VIRTUAL_THREADS=${CHANNEL_VIRTUAL_THREADS:-true}
      - SCHEDULER_PARALLEL_ENABLED=${SCHEDULER_PARALLEL_ENABLED:-true}
      - OUTBOX_BATCH_SIZE=${OUTBOX_BATCH_SIZE:-100}
    volumes:
      - /var/log/app:/var/log/app
    ports:
      - "8080:8080"
    networks:
      - payment-network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  payment-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
