# 앱 서비스 컨테이너 구성 (4 비즈니스 서비스 + Eureka + Gateway)
# 사용법:
#   ./gradlew :payment-service:bootJar :pg-service:bootJar :product-service:bootJar :user-service:bootJar :gateway:bootJar
#   docker compose -f docker/docker-compose.infra.yml -f docker/docker-compose.apps.yml up -d
#
# 아키텍처:
#   - payment-service 8080 (컨테이너) ← docker 프로필
#   - pg-service 8082
#   - product-service 8083
#   - user-service 8084
#   - gateway 8080 → 호스트는 8090 포트로 노출 (payment-service와 컨테이너 포트 중복 회피)
#   - eureka 8761 (docker/docker-compose.infra.yml에서 기동)
#
# 토폴로지: Eureka discovery + DB per service + Gateway routing

services:

  # ───────────────────────────────────────────
  # payment-service — 결제 도메인 핵심 (orderId 점유, redis-stock 선차감, outbox)
  # ───────────────────────────────────────────
  payment-service:
    build:
      context: ../payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    hostname: payment-service
    labels:
      com.hyoguoo.loki.enable: "true"
      com.hyoguoo.application: "payment-service"
      com.hyoguoo.environment: "docker"
    depends_on:
      eureka:
        condition: service_healthy
      mysql-payment:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis-dedupe:
        condition: service_healthy
      redis-stock:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_ENABLED: "true"
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis-dedupe
      SPRING_DATA_REDIS_PORT: "6379"
      REDIS_STOCK_HOST: redis-stock
      REDIS_STOCK_PORT: "6379"
      DB_USERNAME: root
      DB_PASSWORD: payment123
      PRODUCT_ADAPTER_TYPE: http
      USER_ADAPTER_TYPE: http
      TOSS_SECRET_KEY: ${TOSS_TEST_SECRET_KEY:-test_sk_placeholder}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
    networks:
      - payment-infra-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ───────────────────────────────────────────
  # pg-service (PG 어댑터 + Outbox + FCG)
  # ───────────────────────────────────────────
  pg-service:
    build:
      context: ../pg-service
      dockerfile: Dockerfile
    container_name: pg-service
    hostname: pg-service
    labels:
      com.hyoguoo.loki.enable: "true"
      com.hyoguoo.application: "pg-service"
      com.hyoguoo.environment: "docker"
    depends_on:
      eureka:
        condition: service_healthy
      mysql-pg:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis-dedupe:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_ENABLED: "true"
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PG_DATASOURCE_USERNAME: root
      PG_DATASOURCE_PASSWORD: payment123
      PG_GATEWAY_TYPE: ${PG_GATEWAY_TYPE:-toss}
      TOSS_SECRET_KEY: ${TOSS_TEST_SECRET_KEY:-test_sk_placeholder}
      TOSS_API_URL: ${TOSS_API_URL:-https://api.tosspayments.com/v1/payments}
      NICEPAY_CLIENT_KEY: ${NICEPAY_CLIENT_KEY:-}
      NICEPAY_SECRET_KEY: ${NICEPAY_SECRET_KEY:-}
      NICEPAY_API_URL: ${NICEPAY_API_URL:-https://sandbox-api.nicepay.co.kr}
      SPRING_DATA_REDIS_HOST: redis-dedupe
      SPRING_DATA_REDIS_PORT: "6379"
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
    networks:
      - payment-infra-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ───────────────────────────────────────────
  # product-service (재고 저장소 + StockCommit consumer)
  # ───────────────────────────────────────────
  product-service:
    build:
      context: ../product-service
      dockerfile: Dockerfile
    container_name: product-service
    hostname: product-service
    labels:
      com.hyoguoo.loki.enable: "true"
      com.hyoguoo.application: "product-service"
      com.hyoguoo.environment: "docker"
    depends_on:
      eureka:
        condition: service_healthy
      mysql-product:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_ENABLED: "true"
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PRODUCT_DATASOURCE_USERNAME: root
      PRODUCT_DATASOURCE_PASSWORD: payment123
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
    networks:
      - payment-infra-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ───────────────────────────────────────────
  # user-service (결제 사용자 조회 API)
  # ───────────────────────────────────────────
  user-service:
    build:
      context: ../user-service
      dockerfile: Dockerfile
    container_name: user-service
    hostname: user-service
    labels:
      com.hyoguoo.loki.enable: "true"
      com.hyoguoo.application: "user-service"
      com.hyoguoo.environment: "docker"
    depends_on:
      eureka:
        condition: service_healthy
      mysql-user:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_ENABLED: "true"
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka/
      USER_DATASOURCE_USERNAME: root
      USER_DATASOURCE_PASSWORD: payment123
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
    networks:
      - payment-infra-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ───────────────────────────────────────────
  # gateway (Spring Cloud Gateway + Eureka lb://)
  # 컨테이너 내부는 8080이지만 payment-service(8080)와 겹치지 않도록 호스트는 8090 사용
  # ───────────────────────────────────────────
  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    container_name: gateway
    hostname: gateway
    labels:
      com.hyoguoo.loki.enable: "true"
      com.hyoguoo.application: "gateway"
      com.hyoguoo.environment: "docker"
    depends_on:
      eureka:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      pg-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka/
      MONOLITH_FALLBACK_URI: http://payment-service:8080
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
    networks:
      - payment-infra-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

networks:
  payment-infra-network:
    external: true
    name: payment-infra-network
