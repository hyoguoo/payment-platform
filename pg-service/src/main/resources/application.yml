server:
  port: 8082

spring:
  application:
    name: pg-service

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${PG_DATASOURCE_URL:jdbc:mysql://localhost:3308/pg?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${PG_DATASOURCE_USERNAME:root}
    password: ${PG_DATASOURCE_PASSWORD:root}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 15
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    template:
      observation-enabled: true
    listener:
      observation-enabled: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  output:
    ansi:
      enabled: always

  myapp:
    toss-payments:
      secret-key: ${TOSS_SECRET_KEY:}
      api-url: ${TOSS_API_URL:https://api.tosspayments.com/v1/payments}
    nicepay:
      client-key: ${NICEPAY_CLIENT_KEY:}
      secret-key: ${NICEPAY_SECRET_KEY:}
      api-url: ${NICEPAY_API_URL:https://sandbox-api.nicepay.co.kr}

spring.profiles.default: local

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:false}
    register-with-eureka: ${EUREKA_CLIENT_ENABLED:false}
    fetch-registry: ${EUREKA_CLIENT_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    # 다중 인스턴스 (--scale <svc>=N) 시 instanceId 충돌 회피.
    # spring.application.name + 랜덤 UUID + 포트 — 인스턴스마다 고유 + 포트 가시성 보존.
    instance-id: ${spring.application.name}:${random.uuid}:${server.port}

pg:
  kafka:
    topics:
      events-confirmed: ${PG_TOPIC_EVENTS_CONFIRMED:payment.events.confirmed}
      commands-confirm: ${PG_TOPIC_COMMANDS_CONFIRM:payment.commands.confirm}
      commands-confirm-dlq: ${PG_TOPIC_COMMANDS_CONFIRM_DLQ:payment.commands.confirm.dlq}
  retry:
    mode: outbox
  scheduler:
    polling-worker:
      fixed-delay-ms: 2000
      batch-size: 10
  outbox:
    channel:
      capacity: 1024
      worker-count: 1
  http:
    connect-timeout-millis: ${PG_HTTP_CONNECT_TIMEOUT_MS:3000}
    read-timeout-millis: ${PG_HTTP_READ_TIMEOUT_MS:10000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: pg-service
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
