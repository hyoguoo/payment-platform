# pg-service smoke 프로파일 — phase-3-integration-smoke.sh 전용.
#
# 활성화 방법 (절대 production 에서 활성화 금지):
#   SPRING_PROFILES_ACTIVE=docker,smoke 또는
#   docker-compose.smoke.yml override 적용.
#
# 효과:
#   - pg.gateway.type=fake 로 override 되어 FakePgGatewayStrategy 가 로드된다.
#   - Toss/NicePay 스트래티지는 @ConditionalOnProperty 미스매치로 로드되지 않는다.
#   - 트레이싱 샘플링률 100% 로 Tempo chain 확인을 보장한다.
pg:
  gateway:
    type: fake

management:
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.hyoguoo.paymentplatform.pg.infrastructure.gateway.fake: DEBUG
