plugins {
    id 'org.springframework.boot'
    id 'io.spring.dependency-management'
}

dependencies {
    // Spring Boot Core
    implementation 'org.springframework.boot:spring-boot-starter-web'

    // AOP (T2a-02: TossApiMetricsAspect — aspectjweaver 전이 의존 포함)
    implementation 'org.springframework.boot:spring-boot-starter-aop'

    // Actuator / Micrometer (T2a-02: TossApiMetrics MeterRegistry 주입)
    implementation 'org.springframework.boot:spring-boot-starter-actuator'

    // Kafka (ADR-30: payment.commands.confirm consumer + payment.events.confirmed publisher)
    implementation 'org.springframework.kafka:spring-kafka'

    // JPA + Flyway + MySQL (T2a-04: pg_inbox · pg_outbox 스키마 마이그레이션)
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'com.mysql:mysql-connector-j'
    implementation 'org.flywaydb:flyway-core'
    implementation 'org.flywaydb:flyway-mysql'
}

spotbugsMain {
    excludeFilter = rootProject.file('config/spotbugs/spotbugs-exclude.xml')
    reports {
        html {
            required = true
        }
        xml {
            required = true
        }
    }
}

spotbugsTest {
    excludeFilter = rootProject.file('config/spotbugs/spotbugs-exclude-test.xml')
    reports {
        html {
            required = true
        }
        xml {
            required = true
        }
    }
}
