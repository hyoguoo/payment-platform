spring:
  application:
    name: payment-platform

  threads:
    virtual:
      enabled: true

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  output:
    ansi:
      enabled: always

springdoc:
  packages-to-scan: com.hyoguoo.paymentplatform
  default-produces-media-type: application/json
  api-docs:
    path: /api-docs/json
    groups:
      enabled: true
  cache:
    disabled: true

spring.profiles.default: local

payment:
  retry:
    max-attempts: 5
    backoff-type: FIXED
    base-delay-ms: 5000
    max-delay-ms: 60000
  idempotency:
    maximum-size: 10000
    expire-after-write-seconds: 10
  gateway:
    type: TOSS
    toss:
      base-url: https://api.tosspayments.com
      secret-key: ${TOSS_SECRET_KEY:}
      connect-timeout: 3000
      read-timeout: 10000

scheduler:
  outbox-worker:
    fixed-delay-ms: 5000
    batch-size: 50
    parallel-enabled: true
    in-flight-timeout-minutes: 5

metrics:
  payment:
    state:
      polling-interval-seconds: 10
    health:
      polling-interval-seconds: 10
      thresholds:
        stuck-in-progress-minutes: 5
        max-retry-count: 5
