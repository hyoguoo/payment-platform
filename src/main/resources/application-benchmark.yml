spring:
  config:
    activate:
      on-profile: benchmark

  threads:
    virtual:
      enabled: ${VIRTUAL_THREADS_ENABLED:false}

  payment:
    async-strategy: ${ASYNC_STRATEGY:sync}

  datasource:
    hikari:
      maximum-pool-size: 30   # 200 VU 부하 대응 (기본값 10보다 높임)

  myapp:
    toss-payments:
      http:
        read-timeout-millis: 30000   # FakeTossHttpOperator @Value 바인딩용
      fake:
        min-delay-millis: ${TOSS_MIN_DELAY_MILLIS}   # 기본값: docker/compose/.env
        max-delay-millis: ${TOSS_MAX_DELAY_MILLIS}   # 기본값: docker/compose/.env

outbox:
  channel:
    virtual-threads: ${VIRTUAL_THREADS_ENABLED:false}
    worker-count: ${WORKER_COUNT:200}         # OutboxImmediateWorker 스레드 수
    capacity: ${CHANNEL_CAPACITY:2000}         # PaymentConfirmChannel 큐 용량

scheduler:
  enabled: true   # OutboxWorker 활성화 — Outbox 전략 벤치마크 시 PENDING 레코드 처리
  outbox-worker:
    batch-size: ${SCHEDULER_OUTBOX_WORKER_BATCH_SIZE}       # 기본값: docker/compose/.env
    parallel-enabled: ${VIRTUAL_THREADS_ENABLED:false}  # 기본값: docker/compose/.env
