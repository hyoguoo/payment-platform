spring:
  config:
    activate:
      on-profile: benchmark

  threads:
    virtual:
      enabled: false   # Tomcat은 PT 고정 — 비동기 처리(Worker)에만 VT 적용

  payment:
    async-strategy: ${ASYNC_STRATEGY:sync}

  datasource:
    hikari:
      maximum-pool-size: 50   # Worker 200개 × 평균 DB 점유율 ~5% + Tomcat 여유분

  myapp:
    toss-payments:
      http:
        read-timeout-millis: 30000   # FakeTossHttpOperator @Value 바인딩용
      fake:
        min-delay-millis: ${TOSS_MIN_DELAY_MILLIS}   # 기본값: docker/compose/.env
        max-delay-millis: ${TOSS_MAX_DELAY_MILLIS}   # 기본값: docker/compose/.env

outbox:
  channel:
    virtual-threads: ${CHANNEL_VIRTUAL_THREADS:true}   # Worker VT 여부 (Tomcat과 독립)
    worker-count: ${WORKER_COUNT:300}
    capacity: ${CHANNEL_CAPACITY:2000}

scheduler:
  enabled: true
  outbox-worker:
    fixed-delay-ms: 2000                             # 폴링 주기 2초
    batch-size: ${SCHEDULER_OUTBOX_WORKER_BATCH_SIZE}
    parallel-enabled: ${SCHEDULER_PARALLEL_ENABLED:true}   # OutboxWorker 폴백 병렬 처리 여부
