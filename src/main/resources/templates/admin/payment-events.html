<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Events - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/admin.css">
  <script src="/theme.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Payment Admin</a>
    <div class="d-flex align-items-center gap-2">
      <div id="theme-toggle-slot"></div>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" href="/admin/payments/events">
            <i class="bi bi-calendar-event"></i> Events
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/admin/payments/history">
            <i class="bi bi-clock-history"></i> History
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid my-4">
  <!-- Page Header -->
  <div class="page-header">
    <div>
      <h3>Payment Events</h3>
      <p class="text-secondary-custom mb-0" style="font-size: 0.875rem;">
        Total: <strong th:text="${events != null ? events.totalElements : 0}">0</strong>
      </p>
    </div>
    <button class="btn btn-primary-professional btn-professional" onclick="location.reload()">
      <i class="bi bi-arrow-clockwise"></i> Refresh
    </button>
  </div>

  <!-- Filter -->
  <div class="filter-section">
    <form method="get" action="/admin/payments/events" onsubmit="return validateSearchForm(this)">
      <div class="row g-3 align-items-end">
        <div class="col-sm-8 col-md-6">
          <label for="orderIdFilter" class="form-label">Order ID</label>
          <input type="text" class="form-control" id="orderIdFilter" name="orderId"
                 th:value="${param.orderId}" placeholder="Order ID로 검색">
        </div>
        <div class="col-sm-4 col-md-2">
          <button type="submit" class="btn btn-primary-professional btn-professional w-100">
            <i class="bi bi-search"></i> Search
          </button>
        </div>
      </div>
    </form>
  </div>

  <!-- Events Table -->
  <div class="detail-card">
    <div class="card-header">
      <i class="bi bi-list-ul"></i> Payment Events
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table">
          <thead>
          <tr>
            <th>ID</th>
            <th>Order ID</th>
            <th>Order Name</th>
            <th>PG</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Retry</th>
            <th>Created At</th>
            <th class="sticky-col text-center">Actions</th>
          </tr>
          </thead>
          <tbody>
          <tr th:if="${events != null and events.content != null and !#lists.isEmpty(events.content)}"
              th:each="event : ${events.content}">
            <td><code>#<span th:text="${event.id}">-</span></code></td>
            <td th:text="${event.orderId}">-</td>
            <td th:text="${event.orderName}">-</td>
            <td>
              <span class="badge"
                    th:classappend="${event.gatewayType != null and event.gatewayType.name() == 'TOSS'} ? 'bg-primary' : 'bg-success'"
                    th:text="${event.gatewayType != null ? event.gatewayType.name() : '-'}">-</span>
            </td>
            <td th:text="${'₩' + #numbers.formatDecimal(event.totalAmount, 0, 'COMMA', 0, 'POINT')}">₩0</td>
            <td>
              <span class="status-badge"
                    th:classappend="${'status-' + #strings.toLowerCase(#strings.replace(event.status.toString(), '_', '-'))}"
                    th:text="${event.status}">-</span>
            </td>
            <td th:text="${event.retryCount}">0</td>
            <td th:text="${#temporals.format(event.createdAt, 'yyyy-MM-dd HH:mm')}">-</td>
            <td class="sticky-col text-center">
              <a th:href="@{/admin/payments/events/{id}(id=${event.id})}"
                 class="btn btn-sm btn-primary-professional btn-professional">
                <i class="bi bi-eye"></i> View
              </a>
            </td>
          </tr>
          <tr th:if="${events == null or events.content == null or #lists.isEmpty(events.content)}">
            <td colspan="9" class="text-center text-secondary-custom py-4">
              No payment events found
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Pagination -->
  <div class="pagination-bar" th:if="${events != null and events.totalPages > 1}">
    <a class="page-btn"
       th:classappend="${events.currentPage == 1} ? 'disabled'"
       th:href="@{/admin/payments/events(page=1, size=${events.pageSize}, orderId=${param.orderId})}">
      «
    </a>
    <a class="page-btn"
       th:classappend="${events.currentPage == 1} ? 'disabled'"
       th:href="@{/admin/payments/events(page=${events.currentPage - 1}, size=${events.pageSize}, orderId=${param.orderId})}">
      ‹ Prev
    </a>
    <span class="page-info">
      Page <strong th:text="${events.currentPage}">1</strong> / <strong th:text="${events.totalPages}">1</strong>
    </span>
    <a class="page-btn"
       th:classappend="${events.currentPage == events.totalPages} ? 'disabled'"
       th:href="@{/admin/payments/events(page=${events.currentPage + 1}, size=${events.pageSize}, orderId=${param.orderId})}">
      Next ›
    </a>
    <a class="page-btn"
       th:classappend="${events.currentPage == events.totalPages} ? 'disabled'"
       th:href="@{/admin/payments/events(page=${events.totalPages}, size=${events.pageSize}, orderId=${param.orderId})}">
      »
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function validateSearchForm(form) {
    const input = form.querySelector('#orderIdFilter');
    if (input && input.value) {
      input.value = input.value.trim();
      if (!input.value) input.removeAttribute('name');
    }
    return true;
  }
</script>
</body>
</html>
