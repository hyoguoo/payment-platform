<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment History - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/admin.css">
  <script src="/theme.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Payment Admin</a>
    <div class="d-flex align-items-center gap-2">
      <div id="theme-toggle-slot"></div>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="/admin/payments/events">
            <i class="bi bi-calendar-event"></i> Events
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="/admin/payments/history">
            <i class="bi bi-clock-history"></i> History
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid my-4">
  <!-- Page Header -->
  <div class="page-header">
    <div>
      <h3>Payment History</h3>
      <p class="text-secondary-custom mb-0" style="font-size: 0.875rem;">
        Total: <strong th:text="${histories != null ? histories.totalElements : 0}">0</strong>
      </p>
    </div>
    <button class="btn btn-primary-professional btn-professional" onclick="location.reload()">
      <i class="bi bi-arrow-clockwise"></i> Refresh
    </button>
  </div>

  <!-- Filter -->
  <div class="filter-section">
    <form method="get" action="/admin/payments/history" onsubmit="return validateSearchForm(this)">
      <div class="row g-3 align-items-end">
        <div class="col-sm-8 col-md-6">
          <label for="orderIdFilter" class="form-label">Order ID</label>
          <input type="text" class="form-control" id="orderIdFilter" name="orderId"
                 th:value="${param.orderId}" placeholder="Order ID로 검색">
        </div>
        <div class="col-sm-4 col-md-2">
          <button type="submit" class="btn btn-primary-professional btn-professional w-100">
            <i class="bi bi-search"></i> Search
          </button>
        </div>
      </div>
    </form>
  </div>

  <!-- History Table -->
  <div class="detail-card">
    <div class="card-header">
      <i class="bi bi-list-ul"></i> Status Change History
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table">
          <thead>
          <tr>
            <th>ID</th>
            <th>Order ID</th>
            <th>Previous Status</th>
            <th style="width: 32px;"></th>
            <th>Current Status</th>
            <th>Changed At</th>
            <th>Reason</th>
          </tr>
          </thead>
          <tbody>
          <tr th:if="${histories != null and histories.content != null and !#lists.isEmpty(histories.content)}"
              th:each="history : ${histories.content}">
            <td><code>#<span th:text="${history.id}">-</span></code></td>
            <td>
              <a th:href="@{/admin/payments/events/{id}(id=${history.paymentEventId})}"
                 th:text="${history.orderId}">-</a>
            </td>
            <td>
              <span class="status-badge" th:if="${history.previousStatus}"
                    th:classappend="${'status-' + #strings.toLowerCase(#strings.replace(history.previousStatus.toString(), '_', '-'))}"
                    th:text="${history.previousStatus}">-</span>
              <span class="status-badge status-initial" th:unless="${history.previousStatus}">Initial</span>
            </td>
            <td class="text-center text-secondary-custom">→</td>
            <td>
              <span class="status-badge"
                    th:classappend="${'status-' + #strings.toLowerCase(#strings.replace(history.currentStatus.toString(), '_', '-'))}"
                    th:text="${history.currentStatus}">-</span>
            </td>
            <td style="white-space: nowrap;" th:text="${#temporals.format(history.changeStatusAt, 'yyyy-MM-dd HH:mm:ss')}">-</td>
            <td style="max-width: 260px; word-break: break-word; white-space: normal;" th:text="${history.reason}">-</td>
          </tr>
          <tr th:if="${histories == null or histories.content == null or #lists.isEmpty(histories.content)}">
            <td colspan="7" class="text-center text-secondary-custom py-4">
              No payment history found
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Pagination -->
  <div class="pagination-bar" th:if="${histories != null and histories.totalPages > 1}">
    <a class="page-btn"
       th:classappend="${histories.currentPage == 1} ? 'disabled'"
       th:href="@{/admin/payments/history(page=1, size=${histories.pageSize}, orderId=${param.orderId})}">
      «
    </a>
    <a class="page-btn"
       th:classappend="${histories.currentPage == 1} ? 'disabled'"
       th:href="@{/admin/payments/history(page=${histories.currentPage - 1}, size=${histories.pageSize}, orderId=${param.orderId})}">
      ‹ Prev
    </a>
    <span class="page-info">
      Page <strong th:text="${histories.currentPage}">1</strong> / <strong th:text="${histories.totalPages}">1</strong>
    </span>
    <a class="page-btn"
       th:classappend="${histories.currentPage == histories.totalPages} ? 'disabled'"
       th:href="@{/admin/payments/history(page=${histories.currentPage + 1}, size=${histories.pageSize}, orderId=${param.orderId})}">
      Next ›
    </a>
    <a class="page-btn"
       th:classappend="${histories.currentPage == histories.totalPages} ? 'disabled'"
       th:href="@{/admin/payments/history(page=${histories.totalPages}, size=${histories.pageSize}, orderId=${param.orderId})}">
      »
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function validateSearchForm(form) {
    const inputs = form.querySelectorAll('input[type="text"]');
    inputs.forEach(input => {
      if (input.value) input.value = input.value.trim();
      if (!input.value) input.removeAttribute('name');
    });
    return true;
  }
</script>
</body>
</html>
