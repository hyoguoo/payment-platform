spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:mysql://mysql-product:3306/product?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${PRODUCT_DATASOURCE_USERNAME:root}
    password: ${PRODUCT_DATASOURCE_PASSWORD:payment123}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis-dedupe}
      port: ${SPRING_DATA_REDIS_PORT:6379}

product:
  cache:
    stock-redis:
      host: ${REDIS_STOCK_HOST:redis-stock}
      port: ${REDIS_STOCK_PORT:6379}

logging:
  level:
    root: INFO
    com.hyoguoo.paymentplatform: INFO
