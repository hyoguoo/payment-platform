spring:
  config:
    activate:
      on-profile: docker

  datasource:
    # D1/D2로 NOW()·existsValid 제거 완료. connectionTimeZone=UTC 존치 근거(D5):
    #   raw-JDBC Timestamp.from(instant) 바인딩(recordIfAbsent INSERT IGNORE / DELETE-by-uuid / deleteExpired)의 DB 세션 UTC backstop.
    url: jdbc:mysql://mysql-product:3306/product?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true
    username: ${PRODUCT_DATASOURCE_USERNAME:root}
    password: ${PRODUCT_DATASOURCE_PASSWORD:payment123}

  flyway:
    locations: classpath:db/schema

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

logging:
  level:
    root: INFO
    com.hyoguoo.paymentplatform: INFO

scheduler:
  enabled: true
