server:
  port: 8083

spring:
  application:
    name: product-service

  threads:
    virtual:
      enabled: true

  datasource:
    # D1/D2로 NOW()·existsValid 제거 완료.
    # connectionTimeZone=UTC 존치 근거: raw-JDBC Timestamp.from(instant) 바인딩
    #   (recordIfAbsent INSERT IGNORE / recordIfAbsent DELETE-by-uuid / deleteExpired)
    #   의 DB 세션 UTC backstop — D5.
    url: ${PRODUCT_DATASOURCE_URL:jdbc:mysql://localhost:3309/product?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true}
    username: ${PRODUCT_DATASOURCE_USERNAME:root}
    password: ${PRODUCT_DATASOURCE_PASSWORD:root}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 15
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      properties:
        # D6 결정 — EOS read_committed: payment-service 가 abort 한 트랜잭션 메시지가
        # StockCommitConsumer 에 노출되지 않도록 차단. DR-4 흡수.
        # 운영 배포 순서: product-service 먼저 배포 → payment-service EOS 발행 시작 (DR-4).
        isolation.level: read_committed
    template:
      observation-enabled: true
    listener:
      observation-enabled: true

  flyway:
    enabled: true
    locations: classpath:db/schema,classpath:db/seed

  output:
    ansi:
      enabled: always

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:false}
    register-with-eureka: ${EUREKA_CLIENT_ENABLED:false}
    fetch-registry: ${EUREKA_CLIENT_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    # 다중 인스턴스 (--scale <svc>=N) 시 instanceId 충돌 회피.
    # spring.application.name + 랜덤 UUID + 포트 — 인스턴스마다 고유 + 포트 가시성 보존.
    instance-id: ${spring.application.name}:${random.uuid}:${server.port}

scheduler:
  dedupe-cleanup-worker:
    fixed-delay-ms: 3600000   # 1시간
    batch-size: 1000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: product-service
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
