server:
  port: 8083

spring:
  application:
    name: product-service

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${PRODUCT_DATASOURCE_URL:jdbc:mysql://localhost:3309/product?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${PRODUCT_DATASOURCE_USERNAME:root}
    password: ${PRODUCT_DATASOURCE_PASSWORD:root}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 15
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    template:
      observation-enabled: true
    listener:
      observation-enabled: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  flyway:
    enabled: true
    locations: classpath:db/migration

product:
  cache:
    stock-redis:
      # host/port는 application-docker.yml에서 REDIS_STOCK_HOST/REDIS_STOCK_PORT 환경변수로 주입
      # host 미설정 시 StockRedisConfig(@ConditionalOnProperty) 빈 미등록 → 로컬 테스트 safe
      port: ${REDIS_STOCK_PORT:6380}

  output:
    ansi:
      enabled: always

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:false}
    register-with-eureka: ${EUREKA_CLIENT_ENABLED:false}
    fetch-registry: ${EUREKA_CLIENT_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: product-service
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
