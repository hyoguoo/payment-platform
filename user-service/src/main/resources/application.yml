server:
  port: 8084

spring:
  application:
    name: user-service

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${USER_DATASOURCE_URL:jdbc:mysql://localhost:3310/user?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${USER_DATASOURCE_USERNAME:root}
    password: ${USER_DATASOURCE_PASSWORD:root}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  output:
    ansi:
      enabled: always

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:false}
    register-with-eureka: ${EUREKA_CLIENT_ENABLED:false}
    fetch-registry: ${EUREKA_CLIENT_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    # 다중 인스턴스 (--scale <svc>=N) 시 instanceId 충돌 회피.
    # spring.application.name + 랜덤 UUID + 포트 — 인스턴스마다 고유 + 포트 가시성 보존.
    instance-id: ${spring.application.name}:${random.uuid}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: user-service
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
