server:
  port: 8084

spring:
  application:
    name: user-service

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${USER_DATASOURCE_URL:jdbc:mysql://localhost:3310/user?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${USER_DATASOURCE_USERNAME:root}
    password: ${USER_DATASOURCE_PASSWORD:root}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  output:
    ansi:
      enabled: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: user-service
  prometheus:
    metrics:
      export:
        enabled: true
