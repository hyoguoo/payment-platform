# MSA-TRANSITION Phase 4 — Toxiproxy 장애 주입 전용 compose
# ADR-29 · T4-01 대응. docker-compose.infra.yml + apps.yml에 **추가로** 얹어 쓴다.
#
# 사용법:
#   docker compose -f docker-compose.infra.yml -f docker-compose.apps.yml -f docker-compose.chaos.yml up -d
#
# 포트 레이아웃:
#   API         8474 → Toxiproxy 제어 plane
#   proxy kafka 29093 → kafka:9092 upstream
#   proxy mysql 23306 → payment-mysql-payment upstream
#   proxy redis 26380 → payment-redis-stock upstream
#
# T4-01 이전에는 앱이 직접 upstream을 가리키므로 이 파일을 올리지 않아도 된다.
services:

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    container_name: payment-toxiproxy
    command: ["-config", "/etc/toxiproxy/config.json", "-host", "0.0.0.0"]
    ports:
      - "8474:8474"
      - "29093:29092"
      - "23306:23306"
      - "26380:26380"
    volumes:
      - ./chaos/toxiproxy-config.json:/etc/toxiproxy/config.json:ro
    networks:
      - payment-infra-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8474/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  payment-infra-network:
    external: true
    name: payment-infra-network
